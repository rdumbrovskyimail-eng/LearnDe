name: Android CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/executionHistory
            caches/journal-1
            caches/*/gc.properties

      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --no-build-cache \
            --parallel \
            --max-workers=4 \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true \
            -Dkotlin.incremental=false \
            -Dandroid.enableJetifier=false

      - name: Rename APK
        run: |
          mkdir -p apks
          cp app/build/outputs/apk/debug/app-debug.apk \
             apks/CodeExtractor-v${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## 📱 CodeExtractor v1.0.${{ github.run_number }}
            Скачайте APK и установите на устройство.
          files: apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  emulator-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Включаем KVM для аппаратного ускорения эмулятора
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --no-build-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC" \
            -Dkotlin.incremental=false \
            -Dandroid.enableJetifier=false

      # Android 16 = API 36
      - name: Run Emulator (API 36 / Android 16)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 512M
          disk-size: 8192M
          avd-name: android16_test
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back emulated
            -camera-front emulated
          disable-animations: true
          script: |
            echo "=== Эмулятор запущен ==="
            adb devices

            # Установка APK
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            echo "✅ APK установлен"

            # Выдаём разрешения вручную (без UI-диалогов)
            adb shell pm grant com.codeextractor.app \
              android.permission.RECORD_AUDIO
            adb shell pm grant com.codeextractor.app \
              android.permission.POST_NOTIFICATIONS
            echo "✅ Разрешения выданы"

            # Запускаем приложение
            adb shell am start -n \
              com.codeextractor.app/.MainActivity
            echo "✅ MainActivity запущена"

            # Ждём инициализацию
            sleep 3

            # Эмулируем нажатие Start (записываем координаты кнопки)
            # pixel_6: 1080x2400 — кнопка Start примерно x=135, y=2050
            adb shell input tap 135 2050
            echo "🎙 Нажата кнопка Start"

            # Запись 25 секунд
            echo "⏳ Запись идёт 25 секунд..."
            sleep 25

            # Нажимаем Stop
            adb shell input tap 365 2050
            echo "⏹ Нажата кнопка Stop"

            sleep 2

            # Снимаем скриншот результата
            adb shell screencap -p /sdcard/result.png
            adb pull /sdcard/result.png emulator_result.png
            echo "📸 Скриншот сохранён"

            # Сохраняем logcat за всё время теста
            adb logcat -d -s GeminiLive:D GeminiFgService:D \
              > emulator_logcat.txt
            echo "📋 Logcat сохранён"

            # Проверяем: был ли setupComplete в логах
            if grep -q "SETUP COMPLETE" emulator_logcat.txt; then
              echo "✅ TEST PASSED: setupComplete получен"
            else
              echo "⚠ TEST WARNING: setupComplete не найден (нет API ключа в CI — ожидаемо)"
            fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-test-results-${{ github.run_number }}
          path: |
            emulator_result.png
            emulator_logcat.txt
          retention-days: 7