name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success

      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — regenerating wrapper"
            mkdir -p gradle/wrapper
            curl -sLo gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --build-cache \
            --configuration-cache \
            --parallel \
            --max-workers=4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }}"
          body: |
            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Build v1.0.${{ github.run_number }} успешен
            📝 ${{ github.event.head_commit.message }}
            👤 ${{ github.event.head_commit.author.name }}
            📦 Скачать APK: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v1.0.${{ github.run_number }}

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Build v1.0.${{ github.run_number }} упал
            📝 ${{ github.event.head_commit.message }}
            👤 ${{ github.event.head_commit.author.name }}
            🔗 Логи: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}