name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.11.1
      
    - name: Build Release APK
      run: gradle assembleRelease --stacktrace
      
    - name: Rename APK
      run: |
        mkdir -p apks
        cp app/build/outputs/apk/release/app-release.apk apks/CodeExtractor-v${{ github.run_number }}.apk
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          ## 📱 CodeExtractor v1.0.${{ github.run_number }}
          
          **Commit:** `${{ github.sha }}`
          
          ### Установка
          Скачайте APK и установите. Разрешите установку из неизвестных источников.
          
        files: apks/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}