name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      id: build_debug
      run: |
        ./gradlew assembleDebug --stacktrace > build-debug.log 2>&1
        echo "debug_status=$?" >> $GITHUB_OUTPUT
      continue-on-error: true
      
    - name: Build Release APK
      id: build_release
      run: |
        ./gradlew assembleRelease --stacktrace > build-release.log 2>&1
        echo "release_status=$?" >> $GITHUB_OUTPUT
      continue-on-error: true
      
    - name: Extract compilation errors
      if: always()
      run: |
        echo "# Build Logs - Run #${{ github.run_number }}" > compilation-errors.md
        echo "" >> compilation-errors.md
        echo "**Repository:** ${{ github.repository }}" >> compilation-errors.md
        echo "**Branch:** ${{ github.ref_name }}" >> compilation-errors.md
        echo "**Commit:** ${{ github.sha }}" >> compilation-errors.md
        echo "**Date:** $(date -u)" >> compilation-errors.md
        echo "" >> compilation-errors.md
        
        echo "## Debug Build" >> compilation-errors.md
        if [ "${{ steps.build_debug.outputs.debug_status }}" != "0" ]; then
          echo "❌ **Status:** FAILED" >> compilation-errors.md
          echo '```' >> compilation-errors.md
          grep -E "error:|FAILED|FAILURE|Exception|BUILD FAILED" build-debug.log | head -100 >> compilation-errors.md || echo "No specific errors found" >> compilation-errors.md
          echo '```' >> compilation-errors.md
        else
          echo "✅ **Status:** SUCCESS" >> compilation-errors.md
        fi
        
        echo "" >> compilation-errors.md
        echo "## Release Build" >> compilation-errors.md
        if [ "${{ steps.build_release.outputs.release_status }}" != "0" ]; then
          echo "❌ **Status:** FAILED" >> compilation-errors.md
          echo '```' >> compilation-errors.md
          grep -E "error:|FAILED|FAILURE|Exception|BUILD FAILED" build-release.log | head -100 >> compilation-errors.md || echo "No specific errors found" >> compilation-errors.md
          echo '```' >> compilation-errors.md
        else
          echo "✅ **Status:** SUCCESS" >> compilation-errors.md
        fi
        
        echo "" >> compilation-errors.md
        echo "## Full Logs" >> compilation-errors.md
        echo "<details><summary>Debug Build Full Log</summary>" >> compilation-errors.md
        echo "" >> compilation-errors.md
        echo '```' >> compilation-errors.md
        cat build-debug.log >> compilation-errors.md
        echo '```' >> compilation-errors.md
        echo "</details>" >> compilation-errors.md
        
        echo "" >> compilation-errors.md
        echo "<details><summary>Release Build Full Log</summary>" >> compilation-errors.md
        echo "" >> compilation-errors.md
        echo '```' >> compilation-errors.md
        cat build-release.log >> compilation-errors.md
        echo '```' >> compilation-errors.md
        echo "</details>" >> compilation-errors.md
        
    - name: Upload logs to GitHub Gist
      if: always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const content = fs.readFileSync('compilation-errors.md', 'utf8');
          
          try {
            const gist = await github.rest.gists.create({
              description: `Build logs for ${context.repo.owner}/${context.repo.repo} - Run #${context.runNumber}`,
              public: false,
              files: {
                'build-log.md': {
                  content: content
                }
              }
            });
            
            console.log(`📝 Build logs available at: ${gist.data.html_url}`);
            core.summary.addHeading('Build Logs', 2);
            core.summary.addLink('View Full Build Logs', gist.data.html_url);
            await core.summary.write();
          } catch (error) {
            console.log('Failed to create gist, logs available in job output');
            console.log(content);
          }
      
    - name: Get version info
      id: version
      run: |
        VERSION="1.0.${{ github.run_number }}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
        
    - name: Prepare APK files
      if: success()
      run: |
        mkdir -p apk-output
        find app/build/outputs/apk/debug -name "*.apk" -exec cp {} apk-output/app-debug-${{ steps.version.outputs.version }}.apk \; || true
        find app/build/outputs/apk/release -name "*.apk" -exec cp {} apk-output/app-release-${{ steps.version.outputs.version }}.apk \; || true
        
    - name: Create Release with APKs
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        body: |
          ## 📱 Android Build
          
          **Build Date:** ${{ steps.version.outputs.date }}
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          
          ### Downloads
          - 🐛 Debug APK - for testing
          - 🚀 Release APK - for production
          
          ### Installation
          1. Download the APK file
          2. Enable "Install from unknown sources" on your device
          3. Install the APK
          
        files: apk-output/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Comment PR with build results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const buildStatus = '${{ steps.build_debug.outputs.debug_status }}' === '0' && 
                             '${{ steps.build_release.outputs.release_status }}' === '0' 
                             ? '✅ SUCCESS' : '❌ FAILED';
          
          const comment = `## Build Results ${buildStatus}
          
          **Debug Build:** ${'${{ steps.build_debug.outputs.debug_status }}' === '0' ? '✅' : '❌'}
          **Release Build:** ${'${{ steps.build_release.outputs.release_status }}' === '0' ? '✅' : '❌'}
          
          [View detailed logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });