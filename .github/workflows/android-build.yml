name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1
          cache-overwrite-existing: true
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/executionHistory
            caches/journal-1
            caches/*/gc.properties
            caches/*/fileHashes
            caches/transforms-*
            caches/*/scripts
            daemon

      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --no-build-cache \
            --no-configuration-cache \
            --parallel \
            --max-workers=4 \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true \
            -Dkotlin.incremental=false \
            -Dandroid.enableJetifier=false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }}"
          body: |
            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Telegram
        run: |
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="test")
          echo "Telegram response: $RESPONSE"

      - name: Send APK to Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Build v1.0.${{ github.run_number }} успешен
            📝 ${{ github.event.head_commit.message }}
            👤 ${{ github.event.head_commit.author.name }}
          document: app/build/outputs/apk/debug/app-debug.apk

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Build v1.0.${{ github.run_number }} упал
            📝 ${{ github.event.head_commit.message }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}