name: Android CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # НЕ используем cache: 'gradle' здесь — управляем кешем вручную ниже

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
          # КЛЮЧЕВОЕ: исключаем build-cache из кеша.
          # Именно build-cache хранит скомпилированные таски и даёт стейл.
          # Зависимости (.gradle/caches/modules-*) кешируются — они не меняются от коммита.
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/executionHistory
            caches/journal-1
            caches/*/gc.properties

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-build-cache \
            --parallel \
            --max-workers=4 \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true \
            -Dkotlin.incremental=false \
            -Dandroid.enableJetifier=false

      - name: Rename APK
        run: |
          mkdir -p apks
          cp app/build/outputs/apk/debug/app-debug.apk \
             apks/CodeExtractor-v${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## 📱 CodeExtractor v1.0.${{ github.run_number }}
            Скачайте APK и установите на устройство.
          files: apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}