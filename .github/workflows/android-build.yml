name: Android CI & DevOps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← фикс Node.js 20 → 24

jobs:
  build-and-release:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1                          # ← 8.11.1 → 9.4.1
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-overwrite-existing: true
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/executionHistory
            caches/journal-1
            caches/*/gc.properties
            caches/*/fileHashes
            caches/transforms-*
            caches/*/scripts
            daemon

      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --no-build-cache \
            --parallel \
            --max-workers=2 \
            --stacktrace \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true \
            -Dkotlin.incremental=false \
            -Dandroid.enableJetifier=false
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # ← из Secrets, не из файла

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             CodeExtractor-v1.0.${{ github.run_number }}.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }}"
          body: |
            ## 📱 CodeExtractor v1.0.${{ github.run_number }}

            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`

            ### Установка
            1. Скачайте APK ниже
            2. Установите на устройство
            3. Введите Gemini API ключ при первом запуске
          files: CodeExtractor-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: 📊 Audit Library Updates
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache (for audit)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1                          # ← 8.11.1 → 9.4.1
          cache-read-only: true

      - name: Run Update Audit
        run: gradle dependencyUpdates --no-daemon

      - name: Post Job Summary (Visual Report)
        if: always()
        run: |
          echo "## 🚀 Доступные стабильные обновления (Инфо)" >> $GITHUB_STEP_SUMMARY
          echo "Привет, команда! Ваш сервер GitHub проверил реестры библиотек Maven Central и Google Maven." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          cat build/dependencyUpdates/report.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY