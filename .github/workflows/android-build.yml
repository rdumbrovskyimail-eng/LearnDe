name: Android CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.11.1

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run on emulator and capture logs
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        arch: x86_64
        profile: Nexus 6
        script: |
          adb wait-for-device
          adb install app/build/outputs/apk/debug/app-debug.apk
          adb shell am start -n com.codeextractor.app/.MainActivity
          echo "App started, waiting 60 seconds for logs..."
          sleep 60
          adb logcat -d -s GeminiLog:D > gemini_logcat.txt
          adb pull /sdcard/Android/data/com.codeextractor.app/files/gemini_log.txt gemini_log_file.txt || echo "Log file not found on device"
          echo "=== LOGCAT ===" >> gemini_logcat.txt
          cat gemini_logcat.txt

    - name: Rename APK
      run: |
        mkdir -p apks
        cp app/build/outputs/apk/debug/app-debug.apk apks/CodeExtractor-v${{ github.run_number }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          ## 📱 CodeExtractor v1.0.${{ github.run_number }}
          Скачайте APK и проверьте лог файл.
        files: |
          apks/*.apk
          gemini_logcat.txt
          gemini_log_file.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}