name: Rename Package codeextractor to learnde

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace package name in all files
        run: |
          find . -type f \( \
            -name "*.kt" -o \
            -name "*.java" -o \
            -name "*.xml" -o \
            -name "*.gradle" -o \
            -name "*.kts" -o \
            -name "*.pro" \
          \) | xargs sed -i \
            's/com\.codeextractor\.app/com.learnde.app/g'

      - name: Rename source folder
        run: |
          SRC="app/src/main/java/com/codeextractor"
          DST="app/src/main/java/com/learnde"
          if [ -d "$SRC" ]; then
            mv "$SRC" "$DST"
          else
            echo "Folder $SRC not found!"
            exit 1
          fi

      - name: Rename test folders (if exist)
        run: |
          for TEST_TYPE in test androidTest; do
            SRC="app/src/$TEST_TYPE/java/com/codeextractor"
            DST="app/src/$TEST_TYPE/java/com/learnde"
            if [ -d "$SRC" ]; then
              mv "$SRC" "$DST"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refactor: rename package codeextractor to learnde"
          git push
